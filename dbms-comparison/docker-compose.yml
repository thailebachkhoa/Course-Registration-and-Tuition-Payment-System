services:
  mysql:
    image: mysql:8.4
    container_name: dbms_unified_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: course_comparison
      TZ: Asia/Ho_Chi_Minh
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --log-bin=mysql-bin
      - --binlog-format=ROW
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/tests:/tests:ro
      - ./backups/mysql:/backups
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  mongo:
    image: mongo:7.0
    container_name: dbms_unified_mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27120:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
      - ./mongo/tests:/tests:ro
      - ./backups/mongo:/backups
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  mongo-init:
    image: mongo:7.0
    container_name: dbms_unified_mongo_init
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - bash
      - -lc
      - |
        mongosh --host mongo:27017 --quiet --eval '
          try {
            rs.status();
            print("Replica set already initialized");
          } catch (error) {
            rs.initiate({
              _id: "rs0",
              members: [{ _id: 0, host: "mongo:27017" }]
            });
            print("Replica set initialized");
          }
        '

volumes:
  mysql_data:
  mongo_data:
